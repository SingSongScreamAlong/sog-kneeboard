name: lobster-app
region: nyc
services:
- name: api
  github:
    repo: SingSongScreamAlong/sog-kneeboard
    branch: main
    deploy_on_push: true
  source_dir: /GoodShepherd-Consolidated/backend
  dockerfile_path: Dockerfile
  http_port: 8000
  instance_count: 1
  instance_size_slug: basic-xs
  routes:
  - path: /api
    preserve_path_prefix: true
  envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    value: ${db.DATABASE_URL}
  - key: JWT_SECRET_KEY
    scope: RUN_TIME
    type: SECRET
    value: "CHANGE_ME_TO_SOMETHING_SECURE"
  - key: CORS_ORIGINS
    scope: RUN_TIME
    value: "*"
  - key: LOG_LEVEL
    scope: RUN_TIME
    value: INFO
  - key: ENVIRONMENT
    scope: RUN_TIME
    value: production
  - key: REDIS_URL
    scope: RUN_TIME
    value: "redis://localhost:6379"
  - key: ENABLE_BROWSER_SCRAPING
    scope: RUN_TIME
    value: "true"
  health_check:
    http_path: /monitoring/health/live
    initial_delay_seconds: 60
    period_seconds: 30
static_sites:
- name: web
  github:
    repo: SingSongScreamAlong/sog-kneeboard
    branch: main
    deploy_on_push: true
  source_dir: /GoodShepherd-Consolidated/frontend
  build_command: npm install && npm run build
  output_dir: dist
  envs:
  - key: VITE_API_URL
    scope: BUILD_TIME
    value: ${APP_URL}
  - key: VITE_API_BASE_URL
    scope: BUILD_TIME
    value: ${APP_URL}
  routes:
  - path: /
  catchall_document: index.html
databases:
- name: db
  engine: PG
  version: "16"
  production: false
