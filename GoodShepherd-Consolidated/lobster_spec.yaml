alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
features:
- buildpack-stack=ubuntu-22
ingress:
  rules:
  - component:
      name: rne-rne-headless
    match:
      authority: {}
      path:
        prefix: /
maintenance: {}
name: lobster-app
region: nyc
services:
- dockerfile_path: rne-headless/Dockerfile
  envs:
  - key: BRAIN_ENDPOINT
    scope: RUN_AND_BUILD_TIME
    value: https://coral-app-x988a.ondigitalocean.app
  - key: BRAIN_API_KEY
    scope: RUN_AND_BUILD_TIME
    value: "REDACTED"
  - key: MAX_STREAMS
    scope: RUN_AND_BUILD_TIME
    value: "1"
  - key: GOOGLE_API_KEY
    scope: RUN_AND_BUILD_TIME
    value: "REDACTED"
  - key: OPENAI_API_KEY
    scope: RUN_AND_BUILD_TIME
    value: "REDACTED"
  - key: EMAIL_FROM
    scope: RUN_AND_BUILD_TIME
    value: rne@okboxbox.com
  - key: EMAIL_TO
    scope: RUN_AND_BUILD_TIME
    value: conrad@okboxbox.com
  - key: EMAIL_SMTP_USER
    scope: RUN_AND_BUILD_TIME
    value: rne@okboxbox.com
  - key: EMAIL_SMTP_PASS
    scope: RUN_AND_BUILD_TIME
    value: "REDACTED"
  github:
    branch: main
    deploy_on_push: true
    repo: SingSongScreamAlong/RNE
  http_port: 8080
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-1gb
  name: rne-rne-headless
  source_dir: rne-headless
