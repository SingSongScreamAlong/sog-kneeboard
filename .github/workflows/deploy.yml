name: Deploy

on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  NODE_VERSION: '20'
  DO_APP_ID_STAGING: ${{ secrets.DO_APP_ID_STAGING }}
  DO_APP_ID_PROD: ${{ secrets.DO_APP_ID_PROD }}

jobs:
  # =====================================================================
  # Deploy to Staging (on main push)
  # =====================================================================
  deploy-staging:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations (staging)
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Deploy to DigitalOcean App Platform
        run: doctl apps create-deployment ${{ env.DO_APP_ID_STAGING }} --wait

      - name: Health check
        run: |
          sleep 30
          curl -f ${{ secrets.STAGING_URL }}/api/health/ready || exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::error::Staging deployment failed"

  # =====================================================================
  # Deploy to Production (on release)
  # =====================================================================
  deploy-production:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pre-flight checks
        run: |
          echo "Release tag: ${{ github.event.release.tag_name }}"
          echo "Checking production readiness..."

      - name: Migration dry-run
        run: npm run db:migrate:status
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Request backup confirmation
        run: |
          echo "::warning::Ensure database backup was taken before proceeding"
          echo "Backup should be labeled: pre-release-${{ github.event.release.tag_name }}"

      - name: Run migrations (production)
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Deploy to DigitalOcean App Platform
        run: doctl apps create-deployment ${{ env.DO_APP_ID_PROD }} --wait

      - name: Health check
        run: |
          sleep 30
          curl -f ${{ secrets.PROD_URL }}/api/health/ready || exit 1

      - name: Post-deploy verification
        run: |
          echo "Verifying production deployment..."
          curl -s ${{ secrets.PROD_URL }}/api/health | jq '.'

      - name: Create deployment record
        run: |
          echo "Deployed ${{ github.event.release.tag_name }} to production at $(date -u)"

  # =====================================================================
  # Rollback (manual trigger)
  # =====================================================================
  rollback:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: List recent deployments
        run: doctl apps list-deployments ${{ env.DO_APP_ID_PROD }} --format ID,Phase,CreatedAt -o json | head -5

      - name: Rollback to previous deployment
        run: |
          PREV_DEPLOYMENT=$(doctl apps list-deployments ${{ env.DO_APP_ID_PROD }} --format ID -o json | jq -r '.[1]')
          echo "Rolling back to deployment: $PREV_DEPLOYMENT"
          # Note: DO App Platform doesn't support direct rollback, redeploy previous commit instead
          echo "::warning::Manually redeploy previous commit or use doctl to specify commit SHA"
