# =====================================================================
# Docker Compose - Production
# Full ControlBox stack with PostgreSQL
# =====================================================================

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: controlbox-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-controlbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-controlbox_secret}
      POSTGRES_DB: ${POSTGRES_DB:-controlbox}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-controlbox}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ControlBox Server API
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    container_name: controlbox-server
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-controlbox}:${POSTGRES_PASSWORD:-controlbox_secret}@postgres:5432/${POSTGRES_DB:-controlbox}
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ControlBox Dashboard (Nginx)
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    container_name: controlbox-dashboard
    ports:
      - "80:80"
    depends_on:
      - server
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

networks:
  default:
    name: controlbox-network
